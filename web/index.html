<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map</title>
  <link rel="stylesheet" href="lib/leaflet.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- 左: VAB -->
  <div id="vab">
    <h2>VAB</h2>

    <section class="vab-section">
      <h3>setSymbol()</h3>
      <label class="vab-row">
        <span>label</span>
        <input id="vab-label" type="text" placeholder="Alpha" maxlength="31">
      </label>
      <label class="vab-row">
        <span>lat</span>
        <input id="vab-lat" type="number" step="0.001" value="35.690">
      </label>
      <label class="vab-row">
        <span>lon</span>
        <input id="vab-lon" type="number" step="0.001" value="139.692">
      </label>
      <label class="vab-row">
        <span>type</span>
        <select id="vab-type">
          <option value="friendly">friendly</option>
          <option value="enemy">enemy</option>
          <option value="neutral">neutral</option>
          <option value="unknown">unknown</option>
        </select>
      </label>
      <button class="vab-btn" id="vab-set-btn">setSymbol()</button>
    </section>

    <section class="vab-section">
      <h3>removeSymbol()</h3>
      <label class="vab-row">
        <span>label</span>
        <input id="vab-rm-label" type="text" placeholder="Alpha" maxlength="31">
      </label>
      <button class="vab-btn vab-btn-danger" id="vab-rm-btn">removeSymbol()</button>
    </section>

    <section class="vab-section">
      <button class="vab-btn vab-btn-danger" id="vab-clear-btn">clearSymbols()</button>
    </section>

    <div id="vab-feedback"></div>

    <!-- 4×4 カスタムボタングリッド -->
    <section class="vab-section">
      <h3>Custom Buttons</h3>
      <div id="btn-grid"></div>
    </section>
  </div>

  <div class="resize-handle" id="handle-left"></div>

  <!-- 中央: 地図 -->
  <div id="map"></div>

  <div class="resize-handle" id="handle-right"></div>

  <!-- 右: ステータス -->
  <div id="status-panel">
    <h2>Status</h2>
    <div id="status-bar">
      <span id="conn-indicator" class="dot disconnected"></span>
      <span id="conn-label">接続中...</span>
    </div>
    <div id="symbol-count">シンボル数: <strong id="count">0</strong></div>
    <ul id="symbol-list"></ul>
  </div>

  <script src="lib/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
