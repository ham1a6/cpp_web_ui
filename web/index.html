<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POSIX SHM Map Demo</title>
  <link rel="stylesheet" href="lib/leaflet.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="sidebar">
    <h2>Map Symbol Demo</h2>
    <div id="status-bar">
      <span id="conn-indicator" class="dot disconnected"></span>
      <span id="conn-label">接続中...</span>
    </div>
    <div id="symbol-count">シンボル数: <strong id="count">0</strong></div>
    <ul id="symbol-list"></ul>
  </div>
  <div id="map"></div>

  <script src="lib/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
